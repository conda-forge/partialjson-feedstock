{% set name = "partialjson" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 733e540b91e8d9bb6b0d29caf02a4e67e213103d40e25c5f6d16401db3f6ede2

build:
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - partialjson
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/iw4p/partialjson
  summary: Parse incomplete or partial json
  description: Parse incomplete or partial json
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/iw4p/partialjson

extra:
  recipe-maintainers:
    - raybellwaves

