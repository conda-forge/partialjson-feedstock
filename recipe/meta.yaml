{% set name = "partialjson" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e1624f682ac79ac4d9bc384b467a62b7b28f4c83d6c153825314ae9d35f0a2a5

build:
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - partialjson
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/iw4p/partialjson
  summary: Parse incomplete or partial json
  description: Parse incomplete or partial json
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/iw4p/partialjson

extra:
  recipe-maintainers:
    - raybellwaves

